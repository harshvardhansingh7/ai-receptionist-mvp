
<!DOCTYPE html>
<html>
<head>
    <title>AI Receptionist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🤖 AI Receptionist</h1>

    <!-- STATUS -->
    <div id="status" class="status">Click start to begin</div>

    <!-- CALL BUTTON -->
    <button class="call-btn" onclick="startCall()">
        📞 Start Call
    </button>

    <!-- CONVERSATION -->
    <div class="chat-box" id="chatBox"></div>

    <!-- GUIDE -->
    <div class="guide">
        <h3>📌 How to use</h3>
        <ul>
            <li>Click <b>Start Call</b></li>
            <li>Speak clearly when mic is active 🎤</li>
            <li>Provide:
                <ul>
                    <li>Name</li>
                    <li>Date</li>
                    <li>Time</li>
                    <li>Purpose</li>
                </ul>
            </li>
            <li>Wait for confirmation ✅</li>
        </ul>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
